# fail2ban persistent data directory
#
# On bootc/ostree systems, /var isn't part of the immutable image.
# The fail2ban package creates /var/lib/fail2ban at install time,
# but that happens at build time and doesn't persist to the final image.
# This config ensures the directory exists on every boot.
#
# Format: type path mode user group age argument
# d = create directory
# Z = recursively restore SELinux context from system policy

# Create directory: mode 0700, owner root, group root
d /var/lib/fail2ban 0700 root root - -

# Apply correct SELinux context (fail2ban_var_lib_t) so fail2ban can access it
Z /var/lib/fail2ban - - - - -
